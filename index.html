<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="slxd42MLGDM-ekgNSsRKpqEiS5TJWykS9bVcIbZmJBM" />
    <meta name="description" content="UkrPlay — сайт з українськими перекладами ігор за допомогою ШІ">
    <title>UkrPlay — Ігри українською</title>
    <link rel="canonical" href="https://ukrplay.github.io/">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32">
    <style>
        :root {
            --bg: #0a1428;
            --card: rgba(20, 35, 70, 0.75);
            --accent: #ffcc00;
            --blue: #0099ff;
            --lightblue: #00ccff;
            --green: #00cc66;
            --red: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: #e0f0ff;
            line-height: 1.6;
            background-image: 
                linear-gradient(rgba(0,20,60,0.85), rgba(10,20,40,0.95)),
                url('images/back.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes modalPop { 
            from { opacity: 0; transform: scale(0.7); } 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes logoClick { 
            0% { transform: scale(1); } 
            40% { transform: scale(1.18) rotate(10deg); } 
            70% { transform: scale(0.92) rotate(-6deg); } 
            100% { transform: scale(1) rotate(0); } 
        }
        @keyframes shine { 
            0%   { transform: translateX(-150%) skewX(-25deg); }
            20%  { transform: translateX(300%) skewX(-25deg); }
            100% { transform: translateX(300%) skewX(-25deg); }
        }
        @keyframes commentSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { 
            background: rgba(5,15,40,0.92); 
            backdrop-filter: blur(16px) saturate(180%); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,204,0,0.25);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .nav { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 0.9rem 1.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 1rem;
        }
        .logo { 
            font-size: 2.05rem; 
            font-weight: bold; 
            color: #ffffff; 
            text-shadow: none; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            white-space: nowrap;
        }
        .logo:hover { opacity: 0.9; }
        .logo-click { animation: logoClick 0.45s ease forwards; }

        .search {
            flex: 1 1 auto;
            max-width: 420px;
            min-width: 220px;
            margin: 0 1rem;
            padding: 12px 20px; 
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(16px) saturate(180%); 
            border: 1px solid rgba(255,204,0,0.25); 
            border-radius: 50px; 
            color: white; 
            font-size: 1.02rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3),
                        inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .search:focus { 
            box-shadow: 0 0 0 4px rgba(0,153,255,0.4),
                        0 8px 32px rgba(0,0,0,0.3);
            transform: scale(1.03); 
        }

        .hero { 
            height: 360px; 
            display: flex; 
            align-items: center; 
            text-align: center; 
            background: linear-gradient(rgba(0,20,60,0.82), rgba(0,40,100,0.9)); 
            position: relative; 
        }
        .hero::before { 
            content: ''; 
            position: absolute; 
            inset: 0; 
            background: url('images/hero.jpg') center/cover; 
            filter: brightness(0.55); 
            z-index: -1; 
        }
        .hero-content { max-width: 900px; margin: 0 auto; z-index: 2; }
        .hero-logo { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 5px solid #ffcc00; 
            box-shadow: 0 0 25px rgba(255,204,0,0.5),
                        0 0 40px rgba(255,204,0,0.25);
            margin-bottom: 12px; 
            object-fit: cover; 
        }
        .hero h1 { 
            font-size: 2.85rem; 
            margin-bottom: 6px; 
            color: var(--accent); 
            text-shadow: 
                0 4px 20px rgba(0,0,0,0.75),
                0 0 10px #ffcc00,
                0 0 18px #ffcc00,
                0 0 28px rgba(255,204,0,0.35);
        }
        .hero p { 
            font-size: 1.25rem; 
            color: var(--lightblue); 
            margin-bottom: 18px; 
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(0,0,0,0.4);
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
        }
        .stat-number { font-weight: bold; color: var(--accent); }
        .social-links { 
            display: flex; 
            justify-content: center; 
            gap: 16px; 
            margin-top: 10px; 
        }
        .social-links a { 
            width: 48px; 
            height: 48px; 
            background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(12px) saturate(180%); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .social-links a:hover { 
            background: #ffcc00; 
            transform: scale(1.15) rotate(8deg); 
            box-shadow: 0 0 25px #ffcc00;
        }
        .social-links a svg { width: 24px; height: 24px; }

        .filters {
            max-width: 1400px;
            margin: 0 auto 1.5rem;
            padding: 0 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-group strong {
            color: #ffcc00;
            white-space: nowrap;
            font-size: 1.05rem;
        }
        .filter-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.98rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .filter-btn:hover { background: rgba(255,255,255,0.2); }
        .filter-btn.active {
            background: var(--accent);
            color: #002b5e;
            box-shadow: 0 0 20px rgba(255,204,0,0.6);
        }
        .sort-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sort-label {
            color: #ffcc00;
            font-size: 0.98rem;
            white-space: nowrap;
        }
        .sort-select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,204,0,0.25);
            border-radius: 50px;
            padding: 9px 18px;
            color: white;
            cursor: pointer;
            font-size: 0.98rem;
        }
        .sort-select option { background: #0a1428; color: white; }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 1rem 1.5rem 2rem; 
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: var(--card);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255,204,0,0.25);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            opacity: 0;
            animation: fadeInUp 0.6s forwards;
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .game-card:hover { 
            transform: translateY(-18px) scale(1.05);
            box-shadow: 0 0 45px rgba(255,204,0,0.5),
                        0 35px 70px rgba(0,153,255,0.45);
            border-color: rgba(255,204,0,0.6);
        }
        .game-card img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .game-card:hover img { transform: scale(1.1) rotate(1deg); }
        .game-info { padding: 16px; }
        .game-info h3 { margin-bottom: 8px; color: white; font-size: 1.15rem; }
        .tag { 
            display: inline-block;
            background: rgba(0,153,255,0.8); 
            color: #fff; 
            padding: 4px 11px; 
            border-radius: 30px; 
            font-size: 0.82rem; 
            margin: 3px 3px 3px 0;
        }
        .tag-updated { background: rgba(0,204,102,0.8); }
        .progress-container { margin-top: 10px; }
        .progress-label {
            font-size: 0.82rem;
            margin-bottom: 3px;
            color: #a0c0ff;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar {
            height: 7px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ccff, #ffcc00);
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        /* Модальне вікно */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5,15,45,0.94);
            backdrop-filter: blur(20px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal-content {
            background: rgba(15,30,70,0.96);
            backdrop-filter: blur(24px) saturate(180%);
            max-width: 1050px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 20px;
            border: 1px solid rgba(255,204,0,0.3);
            animation: modalPop 0.4s ease forwards;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .modal-close { 
            position: sticky;
            top: 20px;
            right: 22px;
            float: right;
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
            transition: all 0.2s;
            z-index: 10;
            margin: 15px 15px 0 0;
        }
        .modal-close:hover { background: #ffcc00; color: #002b5e; transform: rotate(90deg); }

        .modal-body { 
            display: flex; 
            flex-direction: column;
            padding: 15px 35px 35px 35px;
        }
        .modal-top {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            width: 100%;
        }
        .modal-img { flex: 1; min-width: 260px; max-width: 280px; }
        .modal-img img { width: 100%; border-radius: 16px; }
        .modal-info { flex: 2; min-width: 260px; }
        .modal-info h2 { color: var(--accent); margin-bottom: 16px; font-size: 2rem; }
        .modal-desc { color: #a0c0ff; line-height: 1.7; margin-bottom: 15px; font-size: 0.95rem; }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 10px;
        }
        .download-btn, .back-btn, .share-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .download-btn {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #002b5e;
            position: relative;
            overflow: hidden;
        }
        .download-btn:hover { transform: translateY(-3px); }
        .download-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 60%;
            height: 200%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }
        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); transform: translateY(-3px); }
        .share-btn {
            background: rgba(0,153,255,0.25);
            color: #0099ff;
        }
        .share-btn:hover { background: #0099ff; color: white; transform: translateY(-3px); }

        /* Коментарі */
        .comments-full-width {
            width: 100%;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid rgba(255,204,0,0.3);
        }
        .comments-title {
            color: #ffcc00;
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .comments-count {
            background: rgba(0,153,255,0.3);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
        }
        .comment-form {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            width: 100%;
        }
        .comment-form input, .comment-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,204,0,0.25);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .comment-form input:focus, .comment-form textarea:focus {
            outline: none;
            border-color: #ffcc00;
        }
        .comment-form textarea { min-height: 80px; resize: vertical; }
        .comment-form button {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #002b5e;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }
        .comment-form button:hover { transform: translateY(-2px); }
        .comments-list { width: 100%; }
        .comment-item {
            background: rgba(0,0,0,0.25);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 12px;
            animation: commentSlide 0.3s ease;
            width: 100%;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .comment-author { color: #ffcc00; font-weight: bold; font-size: 0.85rem; }
        .comment-date { color: #88aaff; font-size: 0.7rem; }
        .comment-text { color: #e0f0ff; line-height: 1.5; font-size: 0.9rem; }
        .loading-comments, .no-comments { text-align: center; padding: 30px; color: #88aaff; }
        .comment-message {
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }
        .comment-message.success { background: rgba(0,200,100,0.15); border: 1px solid #00cc66; color: #00ffaa; }
        .comment-message.error { background: rgba(255,50,50,0.15); border: 1px solid #ff4444; color: #ff8888; }

        .scroll-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 99;
            font-size: 20px;
            font-weight: bold;
            color: #002b5e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .scroll-top.show { opacity: 1; visibility: visible; }
        .scroll-top:hover { transform: translateY(-3px); }

        .footer {
            background: rgba(5,15,40,0.92);
            backdrop-filter: blur(12px);
            padding: 25px;
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid rgba(255,204,0,0.25);
        }
        .footer p { color: #88aaff; font-size: 0.8rem; }
        .no-results { text-align: center; padding: 40px; color: #88aaff; grid-column: 1/-1; }

        @media (max-width: 768px) {
            .hero { height: 310px; }
            .hero h1 { font-size: 2.25rem; }
            .hero p { font-size: 1.15rem; }
            .hero-logo { width: 96px; height: 96px; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
            .modal-body { padding: 10px 20px 20px 20px; }
            .modal-img { min-width: 180px; max-width: 200px; }
            .modal-info h2 { font-size: 1.5rem; }
            .nav { padding: 0.8rem 1rem; }
            .logo { font-size: 1.8rem; }
            .search { margin: 0; padding: 10px 16px; font-size: 0.95rem; }
            .sort-label { font-size: 0.85rem; }
            .sort-select { padding: 7px 14px; font-size: 0.85rem; }
        }
        @media (max-width: 480px) {
            .hero { height: 290px; }
            .hero h1 { font-size: 1.8rem; }
            .games-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
            .modal-img { min-width: 140px; max-width: 160px; }
            .modal-actions { flex-direction: column; }
            .download-btn, .back-btn, .share-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav">
            <div class="logo" onclick="goToHome()">UkrPlay</div>
            <input type="text" class="search" placeholder="🔍 Пошук ігор..." id="searchInput" onkeyup="applyFilters()">
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <img src="logo.png" alt="Logo" class="hero-logo" onerror="this.src='https://placehold.co/200x200/0a1428/ffcc00?text=U'">
            <h1>Грайте українською</h1>
            <p>з машинним перекладом, але з українізатором</p>
            <div class="stats">
		<div class="stat-item">🤖 ШІ-переклад</div>
                <div class="stat-item">📦 <span class="stat-number" id="gamesCount">0</span> ігор</div>
            </div>
            <div class="social-links">
                <a href="https://www.youtube.com/channel/UC7RZe16lzkqlsrv1ahgQZFA" target="_blank" title="YouTube">
                    <svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .5 6.186C0 8.07 0 12 0 12s0 3.93.5 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.377.505 9.377.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/></svg>
                </a>
                <a href="https://t.me/UkrPlayUA" target="_blank" title="Telegram">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#229ED9"/><path d="M17.5 7.5L5.5 12L9.5 13.5L11 17.5L17.5 7.5Z" fill="white"/><path d="M11 13.5L17.5 7.5L11 13.5Z" fill="#229ED9"/></svg>
                </a>
                <a href="https://x.com/" target="_blank" title="X">
                    <svg viewBox="0 0 24 24" fill="white"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H1.15l8.6-9.83L0 1.154h7.594l5.243 6.932L18.901 1.153zM17.61 20.644h2.039L6.486 3.24H4.298L17.61 20.644z"/></svg>
                </a>
            </div>
        </div>
    </section>
    <div class="container">
        <h2 style="color:#ffcc00; text-align:center; margin:1.5rem 0 1rem; font-size:1.4rem;">Якість перекладу не дуже висока</h2>
	
    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <strong>Тип перекладу:</strong>
                <button class="filter-btn active" data-filter="translation" data-value="all">Всі</button>
                <button class="filter-btn" data-filter="translation" data-value="Машпер">Машпер</button>
                <button class="filter-btn" data-filter="translation" data-value="Машред">Машред</button>
                <button class="filter-btn" data-filter="translation" data-value="Ручпер">Ручпер</button>
            </div>
            <div class="sort-wrapper">
                <span class="sort-label">📌 Сортувати:</span>
                <select class="sort-select" id="sortSelect" onchange="sortGames()">
                    <option value="updated">🕐 За оновленням</option>
                    <option value="quality">⭐ За якістю</option>
                    <option value="name">🔤 За назвою</option>
                </select>
            </div>
        </div>

        <div class="games-grid" id="games-grid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <div class="modal-body" id="modal-body"></div>
        </div>

        desc: "Сюжетна рольова гра з ізометричним оглядом, дія якої відбувається у Варшаві початку ХХ століття в альтернативній версії реальності. Світ гри поєднує історичне тло з містикою: герой, тауматург, здатен взаємодіяти з надприродними істотами та прихованими сторонами людської душі. Ігролад зосереджений на розслідуваннях, діалогах і тактичних покрокових боях. Гравець вивчає слабкості персонажів, ухвалює морально неоднозначні рішення, впливає на розвиток сюжету та використовує сили салюторів у сутичках, де важливі стратегія й підготовка.",
        categories: ["DeepL", "ChatGPT", "Машред"],
        quality: 10,
        patchLink: "https://mega.nz/folder/R6gQmRqY#dJ9pD1eEOlnbw-dcQYdIXA"
    }
];

        let selectedTranslation = "all";
        let currentGameId = null;
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNK3QpqbBtUfJWVLF7-6503xBAcpg94ePXMHS0KlY7iWjQci2dDbBqYgN9UHP4E4BE/exec';

        // ========== КОМЕНТАРІ ==========
        async function loadComments(gameId) {
            const container = document.getElementById('comments-list');
            if (!container) return;
            container.innerHTML = '<div class="loading-comments">⏳ Завантаження коментарів...</div>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get&gameId=${encodeURIComponent(gameId)}`);
                const data = await res.json();
                if (data.success && data.comments) {
                    displayComments(data.comments);
                    updateCommentsCount(data.comments.length);
                } else {
                    container.innerHTML = '<div class="no-comments">💬 Поки що немає коментарів. Будьте першим!</div>';
                    updateCommentsCount(0);
                }
            } catch(e) {
                container.innerHTML = '<div class="no-comments">⚠️ Не вдалося завантажити коментарі.</div>';
            }
        }

        function displayComments(comments) {
            const container = document.getElementById('comments-list');
            if (!comments || comments.length === 0) {
                container.innerHTML = '<div class="no-comments">💬 Поки що немає коментарів. Будьте першим!</div>';
                return;
            }
            container.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="comment-header">
                                                <span class="comment-author">👤 ${escapeHtml(c.author)}</span>
                        <span class="comment-date">${formatDate(c.date)}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(c.text)}</div>
                </div>
            `).join('');
        }

        function updateCommentsCount(count) {
            const el = document.getElementById('comments-count');
            if (el) {
                if (count === 0) el.textContent = 'Немає коментарів';
                else if (count === 1) el.textContent = '1 коментар';
                else if (count < 5) el.textContent = `${count} коментарі`;
                else el.textContent = `${count} коментарів`;
            }
        }

        async function addComment(gameId, author, text) {
            if (!text.trim()) { showMsg('Введіть текст', 'error'); return; }
            try {
                const params = new URLSearchParams({ action: 'add', gameId, author: author || 'Анонім', text: text.trim() });
                const res = await fetch(`${SCRIPT_URL}?${params}`);
                const data = await res.json();
                if (data.success) {
                    showMsg('✅ Коментар додано!', 'success');
                    document.getElementById('comment-author').value = '';
                    document.getElementById('comment-text').value = '';
                    await loadComments(gameId);
                } else {
                    showMsg(`❌ ${data.error}`, 'error');
                }
            } catch(e) { showMsg('❌ Помилка', 'error'); }
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function formatDate(ds) {
            const d = new Date(ds), now = new Date(), diff = now - d;
            if (diff < 60000) return 'щойно';
            if (diff < 3600000) return `${Math.floor(diff/60000)} хв тому`;
            if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'});
            return d.toLocaleDateString('uk-UA', {day:'numeric',month:'short'});
        }
        function showMsg(msg, type) {
            const el = document.getElementById('comment-msg');
            if (el) { el.textContent = msg; el.className = `comment-message ${type}`; setTimeout(() => { el.textContent = ''; el.className = 'comment-message'; }, 5000); }
        }

        function initComments(gameId) {
            currentGameId = gameId;
            let container = document.getElementById('comments-full');
            if (!container) {
                const modalBody = document.getElementById('modal-body');
                if (!modalBody) return;
                container = document.createElement('div');
                container.id = 'comments-full';
                container.className = 'comments-full-width';
                container.innerHTML = `
                    <div class="comments-title">💬 Коментарі <span id="comments-count" class="comments-count">Завантаження...</span></div>
                    <div id="comment-msg" class="comment-message"></div>
                    <div id="comments-list" class="comments-list"></div>
                    <div class="comment-form">
                        <input type="text" id="comment-author" placeholder="👤 Ваше ім'я (необов'язково)" maxlength="50">
                        <textarea id="comment-text" placeholder="💬 Напишіть коментар... (Ctrl+Enter)" maxlength="2000"></textarea>
                        <button onclick="submitComment()">📤 Залишити коментар</button>
                    </div>
                `;
                modalBody.appendChild(container);
            }
            loadComments(gameId);
            const ta = document.getElementById('comment-text');
            if (ta) { ta.removeEventListener('keydown', keyHandler); ta.addEventListener('keydown', keyHandler); }
        }

        function keyHandler(e) { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); submitComment(); } }
        async function submitComment() {
            const author = document.getElementById('comment-author')?.value.trim() || '';
            const text = document.getElementById('comment-text')?.value.trim();
            if (!currentGameId || !text) return;
            await addComment(currentGameId, author, text);
        }

        // ========== ФУНКЦІЇ ІГОР ==========
        function getGameDate(cats) {
            const upd = cats.find(c => c.includes('Оновлено'));
            if (upd) { 
                const m = upd.match(/\d{2}\.\d{2}\.\d{2}/); 
                if (m) { 
                    const [d,mo,y] = m[0].split('.'); 
                    return new Date(2000 + parseInt(y), parseInt(mo) - 1, parseInt(d)); 
                } 
            }
            return new Date(0);
        }

        function createCard(game, index) {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.style.animationDelay = `${150 + index * 100}ms`;
            let tagsHTML = game.categories.map(cat => {
                let cls = '';
                if (cat.includes('Оновлено')) cls = 'tag-updated';
                return `<span class="tag ${cls}">${escapeHtml(cat)}</span>`;
            }).join('');
            card.innerHTML = `
                <img src="${game.img}" alt="${escapeHtml(game.title)}" loading="lazy" onerror="this.src='https://placehold.co/400x600/1a2a4a/ffcc00?text=UkrPlay'">
                <div class="game-info">
                    <h3>${escapeHtml(game.title)}</h3>
                    <div>${tagsHTML}</div>
                    <div class="progress-container">
                        <div class="progress-label"><span>Якість редагування</span><span>${game.quality}%</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${game.quality}%"></div></div>
                    </div>
                </div>
            `;
            card.onclick = () => { showModal(game); history.replaceState(null, null, '#' + game.id); };
            return card;
        }

        function showModal(game) {
            const modalBody = document.getElementById('modal-body');
            let tagsHTML = game.categories.map(cat => {
                let cls = '';
                if (cat.includes('Оновлено')) cls = 'tag-updated';
                return `<span class="tag ${cls}">${escapeHtml(cat)}</span>`;
            }).join('');
            
            modalBody.innerHTML = `
                <div class="modal-top">
                    <div class="modal-img"><img src="${game.img}" alt="${escapeHtml(game.title)}" onerror="this.src='https://placehold.co/400x600/1a2a4a/ffcc00?text=UkrPlay'"></div>
                    <div class="modal-info">
                        <h2>${escapeHtml(game.title)}</h2>
                        <div class="modal-desc">${escapeHtml(game.desc)}</div>
                        <div style="margin:10px 0;">${tagsHTML}</div>
                        <div class="progress-container" style="margin:15px 0;">
                            <div class="progress-label"><span>Якість редагування</span><span>${game.quality}%</span></div>
                            <div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${game.quality}%"></div></div>
                        </div>
                        <div class="modal-actions">
                            <button class="download-btn" onclick="window.open('${game.patchLink}','_blank')">📥 Завантажити</button>
                            <button class="share-btn" onclick="shareGame('${escapeHtml(game.title)}','${game.id}')">🔗 Поділитися</button>
                            <button class="back-btn" onclick="closeModalAndGoHome()">← Усі ігри</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => initComments(game.id), 100);
        }

        function shareGame(title, id) {
            const url = window.location.origin + window.location.pathname + '#' + id;
            if (navigator.share) navigator.share({ title, text: 'Перегляньте українізатор для ' + title, url }).catch(() => copyToClip(url));
            else copyToClip(url);
        }
        function copyToClip(t) { navigator.clipboard.writeText(t).then(() => showMsg('✅ Посилання скопійовано!', 'success')); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function closeModalAndGoHome() { closeModal(); setTimeout(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); history.replaceState(null, null, window.location.pathname); }, 200); }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.game-card');
            let visible = 0;
            cards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const game = games.find(g => g.title === card.querySelector('h3').textContent);
                const matchSearch = !term || title.includes(term);
                const matchFilter = selectedTranslation === "all" || (game && game.categories.includes(selectedTranslation));
                if (matchSearch && matchFilter) { card.style.display = 'block'; visible++; }
                else { card.style.display = 'none'; }
            });
            const grid = document.getElementById('games-grid');
            let noRes = document.getElementById('no-results');
            if (visible === 0 && cards.length) { 
                if (!noRes) { 
                    const msg = document.createElement('div'); 
                    msg.id = 'no-results'; 
                    msg.className = 'no-results'; 
                    msg.innerHTML = '🔍 Нічого не знайдено'; 
                    grid.appendChild(msg); 
                } 
            } else if (noRes) { noRes.remove(); }
        }

        function sortGames() {
            const sortBy = document.getElementById('sortSelect').value;
            let sorted = [...games];
            if (sortBy === 'quality') sorted.sort((a,b) => b.quality - a.quality);
            else if (sortBy === 'name') sorted.sort((a,b) => a.title.localeCompare(b.title, 'uk'));
            else if (sortBy === 'updated') sorted.sort((a,b) => getGameDate(b.categories) - getGameDate(a.categories));
            const grid = document.getElementById('games-grid');
            grid.innerHTML = '';
            sorted.forEach((g,i) => grid.appendChild(createCard(g,i)));
            applyFilters();
        }

        function initFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('[data-filter="translation"]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedTranslation = btn.getAttribute('data-value');
                    applyFilters();
                });
            });
        }

        function goToHome() {
            const logo = document.querySelector('.logo');
            logo.classList.add('logo-click');
            setTimeout(() => { 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
                history.replaceState(null, null, window.location.pathname); 
                logo.classList.remove('logo-click'); 
            }, 450);
        }

        function openFromHash() {
            const hash = window.location.hash.substring(1);
            if (hash) { 
                const game = games.find(g => g.id === hash); 
                if (game) setTimeout(() => showModal(game), 500); 
            }
        }

        function initScrollTop() {
            const btn = document.getElementById('scrollTop');
            window.addEventListener('scroll', () => { 
                if (window.scrollY > 300) btn.classList.add('show'); 
                else btn.classList.remove('show'); 
            });
        }

        function updateGamesCount() { 
            document.getElementById('gamesCount').textContent = games.length; 
        }

        window.onload = () => {
            initScrollTop();
            
            // Спочатку сортуємо за оновленням
            const sorted = [...games].sort((a,b) => getGameDate(b.categories) - getGameDate(a.categories));
            
            const grid = document.getElementById('games-grid');
            sorted.forEach((g,i) => grid.appendChild(createCard(g,i)));
            
            updateGamesCount();
            initFilters();
            openFromHash();
            window.addEventListener('hashchange', openFromHash);
            document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
        };
    </script>
</body>
</html>
